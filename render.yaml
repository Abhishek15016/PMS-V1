services:
  - type: web
    name: pms-api
    runtime: node
    plan: free
    region: oregon
    buildCommand: pnpm install --frozen-lockfile && pnpm --filter @pms/db exec prisma generate --schema=prisma/schema.prisma && DATABASE_URL=$MIGRATION_DATABASE_URL DIRECT_URL=$MIGRATION_DATABASE_URL pnpm --filter @pms/db exec prisma migrate deploy --schema=prisma/schema.prisma && pnpm exec turbo run build --filter=@pms/api...
    startCommand: pnpm --filter @pms/api start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 22.13.0
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: MIGRATION_DATABASE_URL
        sync: false
      - key: AUTH_BOOTSTRAP_DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_TTL
        value: 15m
      - key: JWT_REFRESH_TTL
        value: 7d
      - key: AUTH_SSO_PROVIDER
        value: stub
      - key: AUTH_MAGIC_LINK_PROVIDER
        value: stub
      - key: CORS_ORIGIN
        sync: false
      # Vendor operator console (/operator): auto-generated on Blueprint
      # sync; read the value from the Render dashboard to unlock the
      # console. Cross-tenant reads fall back to MIGRATION_DATABASE_URL
      # unless PLATFORM_DATABASE_URL is set explicitly.
      - key: PLATFORM_ADMIN_KEY
        generateValue: true
